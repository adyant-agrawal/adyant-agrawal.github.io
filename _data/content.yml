# --- Hero / about section -------------------------------------------------
hero:
  role: Postdoctoral Researcher
  name: Adyant Agrawal
  initials: AA
  affiliation: Institute for Computational Physics, University of Stuttgart
  affiliation_url: https://www.icp.uni-stuttgart.de/
  photo: /assets/img/photo.jpg
  bio: >-
    I am a postdoctoral researcher at the [Institute for Computational Physics (ICP)](https://www.icp.uni-stuttgart.de/), University of Stuttgart. My research uses atomistic, machine-learned, and multiscale methods to understand confined and interfacial fluid phenomena, including salt crystallisation, electrolyte structure at charged interfaces, and gas solubility in nanoconfinement.
  bio_secondary: >-
    Before joining Stuttgart in 2023, I completed my PhD at Queen Mary University of London with Lorenzo Botto, working on the rheology of 2D nanomaterial suspensions and the hydrodynamics of nanosheet exfoliation.

