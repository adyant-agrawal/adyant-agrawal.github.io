# --- Hero / about section -------------------------------------------------
hero:
  role: Postdoctoral Researcher
  name: Adyant Agrawal
  initials: AA
  affiliation: University of Stuttgart
  affiliation_url: https://www.icp.uni-stuttgart.de/
  photo: /assets/img/photo.jpg
  bio: >-
    How do nanoscale interfacial phenomena govern the emergent behaviour of complex and confined fluids? My reseach vision is to develop predictive frameworks for such applied problems, grounded in molecular mechanisms and thermodynamics.
    Currently, at the [Institute for Computational Physics (ICP)](https://www.icp.uni-stuttgart.de/), I use atomistic simulations, machine-learned models, and continuum approaches to investigate salt precipitation in porous media and gas solubility under nanoscale confinement.
  bio_secondary: >-
    Before joining Stuttgart, I completed my PhD at Queen Mary University of London with Lorenzo Botto, working on the rheology of 2D nanomaterial suspensions and the hydrodynamics of nanosheet exfoliation.

