# ---------------------------------------------------------------------------
#  Build settings only. These are read once at startup, so changing this file
#  requires restarting `jekyll serve`.
#
#  All editable content (bio, links, nav, contact, publications, CV, projects)
#  lives in the _data/ folder, which Jekyll hot-reloads on save.
# ---------------------------------------------------------------------------

lang: en
markdown: kramdown

exclude:
  - README.md
  - LICENSE
  - Gemfile
  - Gemfile.lock
  - vendor
