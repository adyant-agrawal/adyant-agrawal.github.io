title: Adyant Agrawal
tagline: Postdoctoral Researcher
author: Adyant Agrawal
author_short: A. Agrawal            # name highlighted (bold) in author lists
email: adyant.agrawal@icp.uni-stuttgart.de
lang: en
description: >-
  Postdoctoral researcher at the Institute for Computational Physics,
  University of Stuttgart. Molecular dynamics of confined electrolytes,
  interfaces, and soft matter.

# --- Hero / about section -------------------------------------------------
hero:
  role: Postdoctoral Researcher
  name: Adyant Agrawal
  initials: AA
  affiliation: Institute for Computational Physics, University of Stuttgart
  photo: /assets/img/photo.jpg
  bio: >-
    I am a postdoctoral researcher at the
    [Institute for Computational Physics (ICP)](https://www.icp.uni-stuttgart.de/),
    University of Stuttgart. My current work uses molecular dynamics to study
    salt crystallisation and disjoining pressure in nanoconfined electrolytes.
  bio_secondary: >-
    Before joining Stuttgart in 2023 I did my PhD at Queen Mary University of
    London with Lorenzo Botto, on the rheology of 2D nanomaterial suspensions
    and the hydrodynamics of nanosheet exfoliation.

